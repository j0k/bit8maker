name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: --win        # Windows .exe (NSIS installer)
          - os: ubuntu-latest
            target: --linux       # Linux .deb + .tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install
      - name: Build native package
        run: npx electron-builder ${{ matrix.target }} --publish never
      - name: Attach binaries to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.deb
            dist/*.tar.gz
