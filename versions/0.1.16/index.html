<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bit8maker — yo, tap the grid, cook a beat… can't be beat.</title>
  <meta name="description" content="Bit8maker — tap the grid, cook a beat. A click-to-make beat sequencer in your browser.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Bit<span class="i">8</span>maker</h1>
      <select id="lang-select" class="lang-sel" aria-label="language"></select>
    </header>
    <p class="tagline" id="tagline"></p>

    <section class="card" id="live-app">
      <div class="transport">
        <button id="play" class="btn"></button>
        <button id="stop-btn" class="btn btn--ghost" hidden></button>
        <button id="rec" class="btn btn--ghost"></button>
        <button id="export" class="btn btn--ghost"></button>
        <button id="share" class="btn btn--ghost"></button>
        <button id="clear" class="btn btn--ghost"></button>
        <select id="preset-select" class="lang-sel" aria-label="presets"><option value=""></option></select>
        <span id="share-status" class="share-status"></span>
        <label class="bpm"><span id="bpm-label"></span>
          <input type="range" id="bpm" min="60" max="250" value="100">
          <b id="bpm-val">100</b>
          <span id="bpm-name" class="bpm-name"></span>
        </label>
      </div>
      <div class="export-bar">
        <input id="track-name" class="track-name" maxlength="60" value="bit8maker">
        <select id="fmt-select" class="lang-sel" aria-label="format">
          <option value="wav">WAV</option><option value="mp3">MP3</option><option value="flac">FLAC</option><option value="midi">MIDI</option>
        </select>
        <select id="mp3-quality" class="lang-sel" aria-label="mp3 bitrate" title="MP3 bitrate">
          <option value="128">128 kbps</option><option value="192" selected>192 kbps</option><option value="256">256 kbps</option><option value="320">320 kbps</option>
        </select>
        <select id="mult-select" class="lang-sel" aria-label="repeat" title="repeat ×N">
          <option value="1">×1</option><option value="2">×2</option><option value="4">×4</option><option value="8">×8</option><option value="16">×16</option><option value="32">×32</option><option value="64">×64</option><option value="100">×100</option>
        </select>
      </div>
      <div class="sections">
        <div class="tabs" id="tabs"></div>
        <input id="sec-name" class="sec-name" maxlength="14" aria-label="section name" placeholder="name">
        <label class="rep"><span id="rep-label"></span>
          <button id="rep-dn" class="mini">−</button><b id="rep-val"></b><button id="rep-up" class="mini">+</button>
        </label>
      </div>
      <div class="gol">
        <label class="gol-tog"><input type="checkbox" id="gol-on"> <span id="gol-label"></span></label>
        <span class="gol-rate"><span id="gol-rate-label"></span>
          <input type="range" id="gol-step" min="1" max="64" value="16"><b id="gol-step-val">16/16</b>
        </span>
        <button id="gol-next" class="mini" title="step">⏭</button>
        <button id="gol-rand" class="mini" title="random seed">🎲</button>
      </div>
      <div class="grid" id="grid"></div>
      <div class="now-playing" id="now-playing">
        <span class="np-dot"></span>
        <b id="np-label"></b>
        <span id="np-info">—</span>
      </div>
      <div class="scope">
        <div class="scope-cap" id="scope-cap"></div>
        <canvas id="wave" class="scope-cv"></canvas>
        <canvas id="spectrum" class="scope-cv"></canvas>
      </div>
    </section>

    <div id="ver-stage" class="ver-stage" hidden></div>

    <section class="card changelog">
      <div class="cl-head">
        <input type="range" id="ver-slider" min="0" max="33" value="33">
        <div class="cl-meta">
          <span id="cl-version" class="cl-ver"></span>
          <span id="cl-commit" class="cl-commit"></span>
          <span id="cl-snap" class="cl-snap"></span>
        </div>
      </div>
      <div id="cl-body"></div>
    </section>

    <footer>
      <span>Bit8maker v<span id="ver"></span> · <a href="https://github.com/j0k/bit8maker" target="_blank">GitHub</a></span>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
